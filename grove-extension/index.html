<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grove Companion</title>
    <style>
      /* Match the popup React component's theme exactly so the brief paint
         before React mounts doesn't flash on either light or dark systems.
         Values mirror `theme.bg` / `theme.text` in popup/Popup.tsx. */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #fafafa;
        color: #09090b;
        width: 360px;
        min-height: 240px;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0a0a0b;
          color: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/popup/main.tsx"></script>
  </body>
</html>
